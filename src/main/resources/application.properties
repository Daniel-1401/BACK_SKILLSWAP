spring.application.name=skillswap
server.port=8080

spring.datasource.url=${SKILLSWAP_DB_URL:jdbc:mysql://localhost:3306/skillswap?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SKILLSWAP_DB_USER:root}
spring.datasource.password=${SKILLSWAP_DB_PASSWORD:toor}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.sql.init.mode=never

skillswap.jwt.secret=skillswap-dev-secret-change-me
skillswap.jwt.expiration-seconds=86400

springdoc.api-docs.path=/api/v1/api-docs
springdoc.swagger-ui.path=/api/v1/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method
